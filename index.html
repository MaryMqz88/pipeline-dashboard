<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Mastersheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e13;--s1:#131720;--s2:#1b2030;--s3:#252b3d;--bd:#2d3450;--tx:#e6eaf2;--t2:#7d89a6;--ac:#5b8def;--a2:#3d6fd9;--gn:#34d399;--am:#fbbf24;--rd:#f87171;--pu:#a78bfa;--gr:#6b7280;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:var(--font)}
.np-ov{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.np-c{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:36px;max-width:400px;width:90%;text-align:center}
.np-c h2{font-size:24px;font-weight:800;margin:14px 0 6px}.np-c p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:16px}
.np-i{width:100%;padding:14px;border-radius:10px;border:2px solid var(--bd);background:var(--bg);color:var(--tx);font-family:var(--font);font-size:17px;text-align:center;outline:none;margin-bottom:14px}
.np-i:focus{border-color:var(--ac)}.np-i::placeholder{color:#4a5270}
.np-b{width:100%;padding:14px;border-radius:10px;border:none;background:var(--a2);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer}
.np-b:hover:not(:disabled){background:var(--ac)}.np-b:disabled{opacity:.35}
.app{padding:14px 16px}.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.hd-l{display:flex;align-items:center;gap:10px}.hd-l h1{font-size:20px;font-weight:800;letter-spacing:-.5px}
.dot{width:8px;height:8px;border-radius:50%;animation:pu 2s infinite}@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.dt{font-size:11px;font-weight:600}.hd-r{display:flex;align-items:center;gap:10px}
.ub{background:var(--s2);border:1px solid var(--bd);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.st{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:8px;margin-bottom:12px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:10px 13px}
.sc .lb{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.sc .vl{font-size:18px;font-weight:800;font-family:var(--mono);margin-top:2px}.sc .sb{font-size:10px;color:var(--t2)}
.bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.pill{padding:5px 13px;border-radius:16px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.pill.on{background:var(--a2);border-color:var(--a2);color:#fff}.pill:hover:not(.on){border-color:var(--t2);color:var(--tx)}
.pill.grn{border-color:var(--gn);color:var(--gn)}.pill.grn:hover{background:var(--gn);color:var(--bg)}
.dv{width:1px;height:20px;background:var(--bd);margin:0 4px}
.sbox{flex:1;min-width:160px;padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-family:var(--font);font-size:12px;outline:none}
.sbox:focus{border-color:var(--ac)}.sbox::placeholder{color:var(--t2)}
.af{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:end}
.af label{font-size:10px;color:var(--t2);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.af input,.af select{background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:6px;font-family:var(--font);font-size:12px;outline:none}
.af input:focus,.af select:focus{border-color:var(--ac)}
.hint{padding:8px 12px;background:rgba(91,141,239,.07);border:1px solid rgba(91,141,239,.18);border-radius:8px;font-size:11px;color:var(--t2);margin-bottom:10px;line-height:1.6}
.hint b{color:var(--ac)}
.mnav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mnav button{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font)}
.mnav button:hover{color:var(--tx);border-color:var(--t2)}.mnav span{font-size:11px;color:var(--t2)}
.gc{overflow-x:auto;border:1px solid var(--bd);border-radius:8px;background:var(--s1)}
.grid{display:grid;min-width:fit-content}
.gh{display:contents}
.gh>div{position:sticky;top:0;z-index:3;background:var(--s2);padding:6px 8px;font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;font-weight:700;border-bottom:2px solid var(--bd);white-space:nowrap;text-align:right}
.gh>div:first-child{text-align:left;position:sticky;left:0;z-index:4;min-width:180px}
.pg{display:contents}.ph{display:contents}
.ph>div{padding:6px 8px;font-size:11px;font-weight:700;background:var(--s2);border-bottom:1px solid var(--bd);border-top:2px solid var(--bd);text-align:right;font-family:var(--mono)}
.ph-n{text-align:left!important;font-family:var(--font)!important;position:sticky;left:0;z-index:2;background:var(--s2);display:flex;align-items:center;gap:4px;font-size:12px}
.xb{background:none;border:none;color:var(--t2);cursor:pointer;font-size:14px;padding:0 3px;opacity:.4}.xb:hover{color:var(--rd);opacity:1}
.row{display:contents}.row>div{padding:3px 8px;font-size:11px;border-bottom:1px solid rgba(45,52,80,.5);text-align:right}
.rl{text-align:left!important;font-family:var(--font);font-weight:500;position:sticky;left:0;z-index:1;background:var(--s1);padding-left:16px!important;font-size:11px}
.rs .rl{color:var(--ac)}.rc .rl{color:var(--rd)}.rg>div{font-weight:700;border-bottom:2px solid var(--bd)}
.cl{padding:2px 4px;min-height:20px;cursor:pointer;border-radius:3px;font-family:var(--mono);font-size:11px;text-align:right;transition:.1s}
.cl:hover{background:rgba(91,141,239,.1)}.cl-s{color:var(--tx)}.cl-c{color:var(--rd)}
.cl-e{color:var(--am);cursor:pointer;border-bottom:1px dashed rgba(251,191,36,.4)}.cl-e:hover{background:rgba(251,191,36,.1)}
.ci{width:100%;background:var(--bg);border:1px solid var(--ac);color:var(--tx);font-family:var(--mono);font-size:11px;padding:2px 4px;border-radius:3px;outline:none;text-align:right}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px}
.loading p{font-size:13px;color:var(--t2)}
.spin{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{padding:10px 14px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;font-size:12px;color:var(--rd);margin-bottom:10px}
.empty{text-align:center;padding:40px;color:var(--t2);font-size:13px;line-height:1.6}
.dbg{padding:6px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;font-size:10px;color:var(--t2);margin-bottom:10px;font-family:var(--mono)}
.vw{border:1px solid var(--bd);border-radius:8px;background:var(--s1);overflow:hidden;margin-top:4px}
.vh{padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.vh h3{font-size:14px;font-weight:700;color:var(--pu)}
.vs{overflow-x:auto;max-height:65vh;overflow-y:auto}
.vt{width:100%;border-collapse:collapse;font-size:11px}
.vt th{text-align:left;padding:8px 10px;font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;font-weight:700;border-bottom:1px solid var(--bd);background:var(--s2);position:sticky;top:0;z-index:1;white-space:nowrap}
.vt th.grp-g{border-top:2px solid var(--gn)}
.vt th.grp-y{border-top:2px solid var(--am)}
.vt th.grp-p{border-top:2px solid var(--pu)}
.vt td{padding:6px 10px;border-bottom:1px solid rgba(45,52,80,.5);white-space:nowrap}
.vt tr:hover td{background:rgba(91,141,239,.03)}
.vt .mn{font-family:var(--mono);font-size:11px}.vt .rt{text-align:right}
.vt input,.vt select{background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:3px 6px;border-radius:4px;font-family:var(--font);font-size:11px;outline:none}
.vt input:focus,.vt select:focus{border-color:var(--ac)}
.vt input.num{text-align:right;font-family:var(--mono);width:90px}
.vt input.sm{width:70px}.vt input.med{width:140px}.vt input.lg{width:200px}
.vt select{min-width:80px}
.st-app{background:rgba(52,211,153,.15);color:var(--gn)}
.st-pen{background:rgba(248,113,113,.15);color:var(--rd)}
.st-rej{background:rgba(107,114,128,.2);color:var(--gr)}
.st-def{background:var(--s3);color:var(--t2)}
.rbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer}
.rbtn:hover{color:var(--tx);border-color:var(--ac)}
.svt{font-size:10px;color:var(--t2)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef}=React;
const API="https://script.google.com/macros/s/AKfycbxZSeOefNZ7nPHiq_Y7ZJNUnIGgfXe8p89KNGLQWhyNdS1SDFy0ZZu5_MdWyc1jrrpFDw/exec";
const MO=["Jan-25","Feb-25","Mar-25","Apr-25","May-25","Jun-25","Jul-25","Aug-25","Sep-25","Oct-25","Nov-25","Dec-25","Jan-26","Feb-26","Mar-26","Apr-26","May-26","Jun-26","Jul-26","Aug-26","Sep-26","Oct-26","Nov-26","Dec-26"];
const RD=["Sales","External Materials","ProFab Materials","Other Costs"];
const RK=["Sales","ExtMaterials","ProfabMaterials","OtherCosts"];
const UK="pipeline-user-name";

function isAppr(s){return String(s||"").toUpperCase().includes("APPROVED")}
function isPen(s){const u=String(s||"").toUpperCase();return u.includes("PENDING")||u.includes("PRICED")}
function isRej(s){const u=String(s||"").toUpperCase();return u.includes("REJECTED")||u.includes("NOT PROCEEDING")}
function stCls(s){if(isAppr(s))return"st-app";if(isPen(s))return"st-pen";if(isRej(s))return"st-rej";return"st-def"}

async function aGet(a){try{const r=await fetch(API+"?action="+a+"&t="+Date.now(),{redirect:"follow"});const t=await r.text();try{return JSON.parse(t)}catch(e){console.error("Parse:",t.substring(0,300));return null}}catch(e){console.error("Fetch:",e);return null}}
async function aPost(p){try{await fetch(API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(p)});return true}catch(e){console.error("POST:",e);return false}}

const fmt=v=>v?Number(v).toLocaleString("en-AU",{maximumFractionDigits:2}):"";
const fmtK=v=>{if(!v)return"-";const a=Math.abs(v);if(a>=1e6)return(v<0?"-":"")+"$"+(a/1e6).toFixed(1)+"M";if(a>=1e3)return(v<0?"-":"")+"$"+(a/1e3).toFixed(0)+"K";return"$"+v};
const num=v=>Number(v)||0;
const gk=(o,...ks)=>{for(const k of ks)if(o[k]!==undefined&&o[k]!=="")return o[k];return""};

function EC({value,onChange,cls}){
  const[ed,setEd]=useState(false);const[d,setD]=useState("");const ref=useRef(null);
  useEffect(()=>{if(ed&&ref.current)ref.current.focus()},[ed]);
  const commit=()=>{setEd(false);const n=parseFloat(d.replace(/,/g,""))||0;if(n!==(value||0))onChange(n)};
  if(ed)return<input ref={ref} className="ci" value={d} onChange={e=>setD(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false)}}/>;
  return<div className={cls||"cl cl-s"} onDoubleClick={()=>{setD(value?String(value):"");setEd(true)}}>{value?fmt(value):""}</div>
}

function App(){
  const[un,setUn]=useState(localStorage.getItem(UK)||"");
  const[ni,setNi]=useState("");const[ld,setLd]=useState(true);const[sv,setSv]=useState(false);const[ls,setLs]=useState(null);
  const[proj,setProj]=useState([]);const[mo,setMo]=useState({});const[vos,setVos]=useState([]);
  const[view,setView]=useState("grid");const[search,setSearch]=useState("");const[scr,setScr]=useState(12);
  const[showAdd,setShowAdd]=useState(false);const[nn,setNn]=useState("");const[nc,setNc]=useState("");
  const[err,setErr]=useState(null);const[dbg,setDbg]=useState("");
  const[showAddVO,setShowAddVO]=useState(false);
  const[nvo,setNvo]=useState({project:"",type:"VO",varNo:"",varName:"",dateSubmitted:"",dateApproved:"",price:0,status:"",extMat:0,pfab:0});

  const subName=nm=>{localStorage.setItem(UK,nm);setUn(nm)};

  const loadData=useCallback(async()=>{
    setLd(true);setErr(null);setDbg("");
    const r=await aGet("getAll");
    if(!r){setErr("No response. Check your Apps Script — make sure you deployed a NEW version.");setLd(false);return}
    if(r.error){setErr("Script error: "+r.error);setLd(false);return}
    const pD=r.projects||[];const mD=r.monthly||[];const vD=r.voRegister||[];
    setDbg("Loaded "+pD.length+" projects, "+mD.length+" monthly, "+vD.length+" VOs");
    setProj(pD.map(p=>({name:String(gk(p,"Project","project","Title")).trim(),cp:num(gk(p,"ContractPrice","contractprice")),v:num(gk(p,"Variations","variations")),status:gk(p,"Status","status")||"Active"})));
    const mm={};
    mD.forEach(row=>{const pj=String(gk(row,"Project","project","Title")).trim();const mn=String(gk(row,"Month","month")).trim();if(!pj||!mn)return;mm[pj+"|||"+mn]={Sales:num(gk(row,"Sales","sales")),ExtMaterials:num(gk(row,"ExtMaterials","extmaterials","External Materials")),ProfabMaterials:num(gk(row,"ProfabMaterials","profabmaterials","Profab Materials","PFab Materials","PFAB MATERIALS")),OtherCosts:num(gk(row,"OtherCosts","othercosts","Other Costs"))}});
    setMo(mm);
    setVos(vD.map((v,i)=>({i,_row:v._row!==undefined?v._row:i,
      project:String(gk(v,"PROJECT","Project","project")).trim(),
      type:String(gk(v,"TYPE","Type","type")),
      date:String(gk(v,"DATE","Date","date")),
      varNo:String(gk(v,"VARIATION NO.","VARIATION NO","Variation No.","Variation No")),
      varName:String(gk(v,"VARIATION NAME","Variation Name","variation name")),
      dateSubmitted:String(gk(v,"DATE SUBMITTED","Date Submitted")),
      dateApproved:String(gk(v,"DATE APPROVED","Date Approved")),
      price:num(gk(v,"PRICE","Price","price","REVENUE","Revenue")),
      status:String(gk(v,"STATUS","Status","status")),
      extMat:num(gk(v,"EXTERNAL MATERIALS","External Materials")),
      pfab:num(gk(v,"PFAB MATERIALS","Pfab Materials","PFab Materials")),
      margin:num(gk(v,"MARGIN","Margin","margin")),
      noMen:num(gk(v,"NO. OF MEN","NO OF MEN","No. of Men")),
      nHrs:num(gk(v,"NORMAL HOURS","Normal Hours")),
      nRate:num(gk(v,"NORMAL RATE","Normal Rate")),
      oHrs:num(gk(v,"OVERTIME HOURS","Overtime Hours")),
      oRate:num(gk(v,"OVERTIME RATE","Overtime Rate"))
    })));
    setLd(false);
  },[]);

  useEffect(()=>{if(un)loadData()},[un,loadData]);

  const gv=(p,m,c)=>mo[p+"|||"+m]?.[c]||0;

  const voByP=useMemo(()=>{const m={};vos.forEach(v=>{if(isAppr(v.status))m[v.project]=(m[v.project]||0)+v.price});return m},[vos]);

  const upCell=useCallback(async(p,m,c,val)=>{setMo(prev=>({...prev,[p+"|||"+m]:{...(prev[p+"|||"+m]||{}),[c]:val}}));setSv(true);await aPost({action:"updateCell",project:p,month:m,column:c,value:val,editedBy:un,editedAt:new Date().toLocaleString("en-AU")});setLs(new Date());setSv(false)},[un]);
  const upProj=useCallback(async(name,field,val)=>{setProj(prev=>prev.map(p=>p.name===name?{...p,[field==="ContractPrice"?"cp":"v"]:val}:p));setSv(true);await aPost({action:"updateProject",name,field,value:val});setLs(new Date());setSv(false)},[]);

  const upVO=useCallback(async(voIdx,field,val)=>{
    const vo=vos[voIdx];if(!vo)return;
    setVos(prev=>prev.map((v,i)=>i===voIdx?{...v,[field]:val}:v));
    const fieldMap={project:"PROJECT",type:"TYPE",date:"DATE",varNo:"VARIATION NO.",varName:"VARIATION NAME",dateSubmitted:"DATE SUBMITTED",dateApproved:"DATE APPROVED",price:"PRICE",status:"STATUS",extMat:"EXTERNAL MATERIALS",pfab:"PFAB MATERIALS",margin:"MARGIN",noMen:"NO. OF MEN",nHrs:"NORMAL HOURS",nRate:"NORMAL RATE",oHrs:"OVERTIME HOURS",oRate:"OVERTIME RATE"};
    setSv(true);await aPost({action:"updateVO",row:vo._row,field:fieldMap[field]||field,value:val});setLs(new Date());setSv(false);
  },[vos,un]);

  const addVO=async()=>{
    if(!nvo.project)return;
    const margin=nvo.price-nvo.extMat-nvo.pfab;
    setSv(true);await aPost({action:"addVO",project:nvo.project,type:nvo.type,varNo:(nvo.type==="DL"?"DL-":"VO-")+nvo.varNo,varName:nvo.varName,dateSubmitted:nvo.dateSubmitted,dateApproved:nvo.dateApproved,price:nvo.price,status:nvo.status,extMaterials:nvo.extMat,pfabMaterials:nvo.pfab,margin});
    setShowAddVO(false);setNvo({project:"",type:"VO",varNo:"",varName:"",dateSubmitted:"",dateApproved:"",price:0,status:"",extMat:0,pfab:0});
    setSv(false);setLs(new Date());
    setTimeout(loadData,1500);
  };

  const addProj=async()=>{if(!nn.trim())return;const cp=parseFloat(nc.replace(/,/g,""))||0;setSv(true);await aPost({action:"addProject",name:nn.trim(),contractPrice:cp,variations:0});setProj(prev=>[...prev,{name:nn.trim(),cp,v:0,status:"Active"}]);setNn("");setNc("");setShowAdd(false);setSv(false);setLs(new Date())};
  const delProj=async nm=>{if(!confirm('Delete "'+nm+'"?'))return;setSv(true);await aPost({action:"deleteProject",name:nm});setProj(prev=>prev.filter(p=>p.name!==nm));setMo(prev=>{const x={...prev};Object.keys(x).forEach(k=>{if(k.startsWith(nm+"|||"))delete x[k]});return x});setSv(false);setLs(new Date())};

  const comp=useMemo(()=>proj.map((p,i)=>{let sT=0,eT=0,pT=0,oT=0;MO.forEach(m=>{sT+=gv(p.name,m,"Sales");eT+=gv(p.name,m,"ExtMaterials");pT+=gv(p.name,m,"ProfabMaterials");oT+=gv(p.name,m,"OtherCosts")});const avo=voByP[p.name]||0;const total=p.cp+p.v+avo;const gp=sT-eT-pT-oT;const tba=total-sT;return{...p,i,sT,eT,pT,oT,avo,total,gp,tba}}),[proj,mo,voByP]);
  const filt=useMemo(()=>{if(!search)return comp;const q=search.toLowerCase();return comp.filter(p=>p.name.toLowerCase().includes(q))},[comp,search]);
  const vis=MO.slice(scr,scr+12);
  const totP=comp.reduce((s,p)=>s+p.total,0);const totGP=comp.reduce((s,p)=>s+p.gp,0);const totS=comp.reduce((s,p)=>s+p.sT,0);const totVO=comp.reduce((s,p)=>s+p.avo,0);

  if(!un)return(<div className="np-ov"><div className="np-c"><div style={{fontSize:52}}>👤</div><h2>Welcome to Pipeline</h2><p>Enter your name so the team knows who made each edit.</p><input className="np-i" placeholder="e.g. Jake, Sarah..." value={ni} onChange={e=>setNi(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&ni.trim())subName(ni.trim())}} autoFocus/><button className="np-b" disabled={!ni.trim()} onClick={()=>subName(ni.trim())}>Enter Dashboard →</button><p style={{fontSize:11,color:"var(--t2)",marginTop:14}}>Saves to your browser — you only do this once.</p></div></div>);

  const gCols="180px 88px 78px 82px 88px 88px 82px 78px "+vis.map(()=>"86px").join(" ");

  return(<div className="app">
    <div className="hd"><div className="hd-l"><h1>Pipeline Mastersheet</h1><span className="dot" style={{background:sv?"var(--am)":"var(--gn)"}}/><span className="dt" style={{color:sv?"var(--am)":"var(--gn)"}}>{sv?"Saving...":"Connected"}</span></div>
    <div className="hd-r"><span className="ub">👤 {un}</span>{ls&&<span className="svt">Saved {ls.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"})}</span>}<button className="rbtn" onClick={loadData}>↻ Sync</button></div></div>

    {err&&<div className="err">{err} <button className="pill" onClick={loadData} style={{marginLeft:8}}>Retry</button></div>}
    {dbg&&<div className="dbg">{dbg}</div>}

    {ld?<div className="loading"><div className="spin"/><p>Loading from Google Sheets...</p></div>:<>

    <div className="st">
      <div className="sc"><div className="lb">Total Pipeline</div><div className="vl" style={{color:"var(--ac)"}}>{fmtK(totP)}</div><div className="sb">{comp.length} projects</div></div>
      <div className="sc"><div className="lb">Revenue Claimed</div><div className="vl">{fmtK(totS)}</div></div>
      <div className="sc"><div className="lb">Gross Profit</div><div className="vl" style={{color:"var(--gn)"}}>{fmtK(totGP)}</div><div className="sb">{totS?((totGP/totS)*100).toFixed(1):0}% margin</div></div>
      <div className="sc"><div className="lb">Approved VOs</div><div className="vl" style={{color:"var(--pu)"}}>{fmtK(totVO)}</div><div className="sb">from VO Register</div></div>
      <div className="sc"><div className="lb">To Allocate</div><div className="vl" style={{color:"var(--am)"}}>{fmtK(comp.reduce((s,p)=>s+Math.max(0,p.tba),0))}</div></div>
    </div>

    <div className="bar">
      {[["grid","Pipeline"],["vos","VO Register"]].map(([k,l])=><button key={k} className={"pill "+(view===k?"on":"")} onClick={()=>setView(k)}>{l}</button>)}
      <div className="dv"/>
      <button className="pill grn" onClick={()=>setShowAdd(!showAdd)}>+ Project</button>
      <input className="sbox" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>

    {showAdd&&<div className="af"><div><label>Project Name</label><input value={nn} onChange={e=>setNn(e.target.value)} placeholder="2140 - Project - Client" style={{width:260}}/></div><div><label>Contract Price</label><input value={nc} onChange={e=>setNc(e.target.value)} placeholder="500000" style={{width:140}}/></div><button className="pill grn" onClick={addProj}>Add</button><button className="pill" onClick={()=>setShowAdd(false)}>Cancel</button></div>}

    {view==="grid"&&<>
      <div className="hint"><b>Double-click</b> any cell to edit. <span style={{color:"var(--am)"}}>Gold underline</span> = editable column. <span style={{color:"var(--pu)"}}>Purple</span> = auto from VO Register (only rows with status containing "Approved" count). <b>Total</b> = Contract + Variations + Approved VOs.</div>
      <div className="mnav"><button onClick={()=>setScr(Math.max(0,scr-3))}>← Earlier</button><span>{vis[0]} — {vis[vis.length-1]}</span><button onClick={()=>setScr(Math.min(12,scr+3))}>Later →</button><div style={{flex:1}}/><button onClick={()=>setScr(0)}>2025</button><button onClick={()=>setScr(12)}>2026</button></div>
      <div className="gc" style={{maxHeight:"68vh",overflowY:"auto"}}><div className="grid" style={{gridTemplateColumns:gCols}}>
        <div className="gh"><div style={{textAlign:"left"}}>Project</div><div style={{color:"var(--am)"}}>Contract</div><div style={{color:"var(--am)"}}>Var.</div><div style={{color:"var(--pu)"}}>Appr.VOs</div><div>Total</div><div>Claimed</div><div>To Alloc.</div><div>GP</div>{vis.map(m=><div key={m}>{m}</div>)}</div>
        {filt.map(p=>{const gpM=m=>gv(p.name,m,"Sales")-gv(p.name,m,"ExtMaterials")-gv(p.name,m,"ProfabMaterials")-gv(p.name,m,"OtherCosts");return<div className="pg" key={p.i}>
          <div className="ph"><div className="ph-n"><button className="xb" onClick={()=>delProj(p.name)}>×</button>{p.name}</div>
            <div><EC value={p.cp} onChange={v=>upProj(p.name,"ContractPrice",v)} cls="cl cl-e"/></div>
            <div><EC value={p.v} onChange={v=>upProj(p.name,"Variations",v)} cls="cl cl-e"/></div>
            <div style={{color:"var(--pu)",fontStyle:"italic"}}>{p.avo?fmt(p.avo):"-"}</div>
            <div style={{fontWeight:800}}>{fmt(p.total)}</div><div>{fmt(p.sT)}</div>
            <div style={{color:p.tba<0?"var(--rd)":p.tba>0?"var(--am)":"var(--gn)"}}>{fmt(p.tba)}</div>
            <div style={{color:"var(--gn)"}}>{fmt(p.gp)}</div>
            {vis.map(m=><div key={m} style={{fontSize:10,color:"var(--t2)"}}>{gv(p.name,m,"Sales")?fmt(gv(p.name,m,"Sales")):""}</div>)}</div>
          {RK.map((rk,ri)=><div className={"row "+(ri===0?"rs":"rc")} key={rk}><div className="rl">{RD[ri]}</div><div/><div/><div/><div/>
            <div style={{fontFamily:"var(--mono)",fontSize:10}}>{fmt([p.sT,p.eT,p.pT,p.oT][ri])||""}</div><div/><div/>
            {vis.map(m=><div key={m}><EC value={gv(p.name,m,rk)} onChange={val=>upCell(p.name,m,rk,val)} cls={ri===0?"cl cl-s":"cl cl-c"}/></div>)}</div>)}
          <div className="row rg"><div className="rl" style={{color:"var(--gn)"}}>Gross Profit</div><div/><div/><div/><div/>
            <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--gn)",fontWeight:700}}>{fmt(p.gp)}</div><div/><div/>
            {vis.map(m=>{const v=gpM(m);return<div key={m} style={{fontFamily:"var(--mono)",fontSize:10,color:v<0?"var(--rd)":"var(--gn)",fontWeight:600}}>{v?fmt(v):""}</div>})}</div>
        </div>})}
      </div></div>
      {filt.length===0&&<div className="empty">{proj.length===0?"No projects yet. Click '+ Project' to get started.":"No match."}</div>}
    </>}

    {view==="vos"&&<div className="vw">
      <div className="vh"><h3>VO / DL Register</h3><div style={{display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--t2)"}}>{vos.length} entries · Approved total: {fmtK(Object.values(voByP).reduce((s,v)=>s+v,0))}</span>
        <button className="pill grn" onClick={()=>setShowAddVO(true)}>+ Add VO/DL</button>
      </div></div>

      {showAddVO&&<div className="af" style={{margin:12}}>
        <div><label>Project</label><select value={nvo.project} onChange={e=>setNvo({...nvo,project:e.target.value})}><option value="">Select...</option>{proj.map(p=><option key={p.name} value={p.name}>{p.name}</option>)}</select></div>
        <div><label>Type</label><select value={nvo.type} onChange={e=>setNvo({...nvo,type:e.target.value})}><option value="VO">VO</option><option value="DL">DL</option></select></div>
        <div><label>No. ({nvo.type}-)</label><input value={nvo.varNo} onChange={e=>setNvo({...nvo,varNo:e.target.value.substring(0,10)})} placeholder="001" style={{width:100}}/></div>
        <div><label>Name/Description</label><input value={nvo.varName} onChange={e=>setNvo({...nvo,varName:e.target.value.substring(0,100)})} placeholder="Description..." style={{width:200}}/></div>
        <div><label>Price</label><input type="number" value={nvo.price||""} onChange={e=>setNvo({...nvo,price:Number(e.target.value)||0})} style={{width:100}}/></div>
        <div><label>Status</label><input value={nvo.status} onChange={e=>setNvo({...nvo,status:e.target.value})} placeholder="e.g. Approved" style={{width:140}}/></div>
        <button className="pill grn" onClick={addVO}>Add</button>
        <button className="pill" onClick={()=>setShowAddVO(false)}>Cancel</button>
      </div>}

      {vos.length===0?<div className="empty">No entries. Add a <b>"VO Register"</b> tab in your Google Sheet or click "+ Add VO/DL" above.</div>:
      <div className="vs"><table className="vt"><thead><tr>
        <th className="grp-g">Project</th><th className="grp-g">Type</th><th className="grp-g">Var No.</th>
        <th className="grp-g">Variation Name</th><th className="grp-g">Date Sub.</th><th className="grp-g">Date Appr.</th>
        <th className="grp-g rt">Price</th><th className="grp-g">Status</th>
        <th className="grp-y rt">Ext. Mat.</th><th className="grp-y rt">PFAB Mat.</th><th className="grp-y rt">Margin</th>
        <th className="grp-p rt"># Men</th><th className="grp-p rt">Norm Hrs</th><th className="grp-p rt">Norm Rate</th>
        <th className="grp-p rt">OT Hrs</th><th className="grp-p rt">OT Rate</th>
      </tr></thead><tbody>
      {vos.map((v,vi)=>{
        const margin=v.price-v.extMat-v.pfab;
        return<tr key={vi}>
          <td><select value={v.project} onChange={e=>upVO(vi,"project",e.target.value)} style={{minWidth:140}}><option value="">—</option>{proj.map(p=><option key={p.name} value={p.name}>{p.name}</option>)}</select></td>
          <td><select value={v.type} onChange={e=>upVO(vi,"type",e.target.value)}><option value="VO">VO</option><option value="DL">DL</option><option value="">—</option></select></td>
          <td><input value={v.varNo} onChange={e=>upVO(vi,"varNo",e.target.value)} className="sm"/></td>
          <td><input value={v.varName} onChange={e=>upVO(vi,"varName",e.target.value.substring(0,100))} className="med"/></td>
          <td><input value={v.dateSubmitted} onChange={e=>upVO(vi,"dateSubmitted",e.target.value)} className="sm" placeholder="dd-mmm-yy"/></td>
          <td><input value={v.dateApproved} onChange={e=>upVO(vi,"dateApproved",e.target.value)} className="sm" placeholder="dd-mmm-yy"/></td>
          <td className="rt"><input type="number" step="0.01" value={v.price||""} onChange={e=>upVO(vi,"price",Number(e.target.value)||0)} className="num"/></td>
          <td><input value={v.status} onChange={e=>upVO(vi,"status",e.target.value)} style={{minWidth:120}} className={stCls(v.status)}/></td>
          <td className="rt"><input type="number" step="0.01" value={v.extMat||""} onChange={e=>upVO(vi,"extMat",Number(e.target.value)||0)} className="num"/></td>
          <td className="rt"><input type="number" step="0.01" value={v.pfab||""} onChange={e=>upVO(vi,"pfab",Number(e.target.value)||0)} className="num"/></td>
          <td className="rt mn" style={{color:margin<0?"var(--rd)":"var(--gn)"}}>{fmt(margin)}</td>
          <td className="rt mn" style={{color:"var(--pu)"}}>{v.noMen||""}</td>
          <td className="rt mn" style={{color:"var(--pu)"}}>{v.nHrs||""}</td>
          <td className="rt mn" style={{color:"var(--pu)"}}>{v.nRate||""}</td>
          <td className="rt mn" style={{color:"var(--pu)"}}>{v.oHrs||""}</td>
          <td className="rt mn" style={{color:"var(--pu)"}}>{v.oRate||""}</td>
        </tr>})}
      </tbody></table></div>}
    </div>}
    </>}
  </div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
